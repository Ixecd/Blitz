name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blitz
          POSTGRES_PASSWORD: blitz
          POSTGRES_DB: blitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/

      - name: Init DB schema
        run: |
          migrate -path internal/db/migrations \
                  -database "postgres://blitz:blitz@localhost:5432/blitz?sslmode=disable&search_path=public" \
                  up

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
        env:
          DATABASE_URL: postgres://blitz:blitz@localhost:5432/blitz?sslmode=disable&search_path=public

      - name: Docker build
        run: |
          docker build \
            -f build/docker/wallet-service/Dockerfile \
            -t wallet-service:ci \
            .