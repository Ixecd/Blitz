swagger: "2.0"
info:
  title: web3-blitz API
  description: web3-blitz 服务 API 文档
  version: "1.0.0"

host: localhost:8080
basePath: /
schemes:
  - http

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

consumes:
  - application/json
produces:
  - application/json

paths:
  /healthz:
    get:
      summary: 健康检查
      produces:
        - text/plain
      responses:
        200:
          description: ok
  /:
    get:
      summary: 服务信息
      security:
        - Bearer: []
      responses:
        200:
          description: 服务信息
