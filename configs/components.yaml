components:
  # 基础设施层（无 image，只部署 helm chart，无需 build/push）
  - name: blitz-postgres
    type: StatefulSet
    deps: []

  - name: blitz-etcd
    type: StatefulSet
    deps: []

  # 业务服务层
  - name: blitz
    port: 8080
    image: blitz
    deps:
      - blitz-postgres
      - blitz-etcd
    # strategy: rolling       # rolling（默认）/ blue-green / canary
    # api_version: v1         # 对外 API 版本，用于 kp compat 依赖检查

