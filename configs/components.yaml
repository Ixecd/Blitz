components:
  # 基础设施层（无 image，只部署 helm chart，无需 build/push）
  - name: blitz-postgres
    type: StatefulSet
    profile: db
    cpu: 200m
    memory: 256Mi
    storage: 1Gi
    deps: []

  - name: blitz-etcd
    type: StatefulSet
    profile: default
    cpu: 100m
    memory: 128Mi
    replicas: 1
    deps: []

  # 业务服务层
  - name: blitz
    type: deployment
    profile: web
    port: 2113
    image: blitz
    cpu: 100m
    memory: 128Mi
    strategy: rolling
    deps:
      - blitz-postgres
      - blitz-etcd
