resources:
  - kind: Deployment
    name: wallet-service
    namespace: web3-blitz
    on-missing: auto-heal
    max_retry: 3
    force-sync: true
    fallback: rollback
    no-sync-fields:
      - replicas

  - kind: StatefulSet
    name: web3-blitz-postgres
    namespace: web3-blitz
    on-missing: alert
    max_retry: 0
    fallback: ""