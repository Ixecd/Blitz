# virtualservice-preview.yaml
# 仅在 strategy: blue-green 时使用，kp deploy --preview 会自动生成填充版本
# 需要 Istio 已安装：kubectl get crd virtualservices.networking.istio.io
#
# 手动 apply 后，用 x-kp-preview: <slot> header 将流量路由到非活跃 slot：
#   curl -H "x-kp-preview: green" http://web3-blitz/healthz
#
# apiVersion: networking.istio.io/v1beta1
# kind: VirtualService
# metadata:
#   name: web3-blitz-preview
#   namespace: {{ .Release.Namespace }}
# spec:
#   hosts:
#   - web3-blitz
#   http:
#   - match:
#     - headers:
#         x-kp-preview:
#           exact: "green"
#     route:
#     - destination:
#         host: web3-blitz-green
#         port:
#           number: {{ .Values.service.port }}
#   - route:
#     - destination:
#         host: web3-blitz
#         port:
#           number: {{ .Values.service.port }}
#       weight: 100
