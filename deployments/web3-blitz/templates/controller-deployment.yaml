apiVersion: apps/v1
kind: Deployment
metadata:
  name: web3-blitz-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: web3-blitz-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web3-blitz-controller
  template:
    metadata:
      labels:
        app: web3-blitz-controller
    spec:
      serviceAccountName: web3-blitz-controller
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}-{{ .Values.global.arch }}:{{ .Values.global.version }}"
          imagePullPolicy: Always
          command: ["dtk", "controller", "start"]
          env:
            - name: PROJECT_NAME
              value: {{ .Values.global.projectName | quote }}
            - name: KUBE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: VERSION
              value: {{ .Values.global.version | quote }}
            - name: ETCD_ENDPOINTS
              value: {{ .Values.controller.etcdEndpoints }}
            - name: RESOURCES_CONFIG
              value: "/app/configs/resources.yaml"
          volumeMounts:
            - name: resources-config
              mountPath: /app/configs
              readOnly: true
      volumes:
        - name: resources-config
          configMap:
            name: web3-blitz-resources-config
