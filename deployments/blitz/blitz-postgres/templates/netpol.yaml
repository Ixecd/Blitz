apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blitz-postgres
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: blitz-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: blitz
      ports:
        - port: 5432
          protocol: TCP
