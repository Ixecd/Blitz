apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blitz
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: blitz
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
