services:
  bitcoind:
    image: qingchun22/bitcoind-regtest:latest
    container_name: bitcoind
    restart: always
    user: root
    ports:
      - "18443:18443"
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin
    healthcheck:
      test: [ "CMD", "bitcoin-cli", "-regtest", "-rpcuser=user", "-rpcpassword=pass", "getblockchaininfo" ]
      interval: 10s
      timeout: 5s
      retries: 5

  geth:
    image: ethereum/client-go:latest
    container_name: geth
    restart: always
    command:
      - --dev
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3,personal,miner
      - --dev.period=5
    ports:
      - "8545:8545"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: blitz
      POSTGRES_PASSWORD: blitz
      POSTGRES_DB: blitz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./internal/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U blitz -d blitz" ]
      interval: 5s
      timeout: 3s
      retries: 5

  wallet-service:
    build:
      context: .
      dockerfile: build/docker/wallet-service/Dockerfile
    container_name: wallet-service
    restart: always
    depends_on:
      bitcoind:
        condition: service_healthy
      geth:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "2113:2113"
    environment:
      - WALLET_HD_SEED=${WALLET_HD_SEED}
      - BTC_RPC_HOST=bitcoind:18443/wallet/blitz_wallet
      - ETH_RPC_HOST=http://geth:8545
      - DATABASE_URL=postgres://blitz:blitz@postgres:5432/blitz?sslmode=disable
    volumes:
      - wallet-data:/app/data

volumes:
  bitcoind-data:
  postgres-data:
  wallet-data: