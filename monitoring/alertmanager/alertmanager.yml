# Alertmanager 配置
# 注意: bot_token 等敏感信息不要提交到 git

global:
  resolve_timeout: 5m

route:
  receiver: 'telegram'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: '<YOUR_BOT_TOKEN>'
        chat_id: <YOUR_CHAT_ID>
        message: |
          🚨 *{{ .GroupLabels.alertname }}*
          {{ range .Alerts }}
          *状态*: {{ .Status }}
          *服务*: {{ .Labels.service }}
          *描述*: {{ .Annotations.description }}
          {{ end }}
        parse_mode: 'Markdown'
