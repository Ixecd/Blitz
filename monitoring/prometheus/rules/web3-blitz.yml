groups:
  - name: web3-blitz
    rules:
      - alert: ServiceDown
        expr: up{job="web3-blitz"} == 0
        for: 1m
        labels:
          severity: critical
          service: web3-blitz
        annotations:
          description: "web3-blitz 已停止响应，请立即检查"

      - alert: HighErrorRate
        expr: increase(web3-blitz_http_request_total{status=~"5.."}[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: web3-blitz
        annotations:
          description: "web3-blitz 过去5分钟 5xx 错误超过10次"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(web3-blitz_http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
          service: web3-blitz
        annotations:
          description: "web3-blitz P99 延迟超过1秒"
